<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Customer Management System — Forget Password</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <span>Customer Management System</span>
      <a href="login.html" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Go Back
      </a>
    </div>
  </header>

  <main class="page">
    <section class="login-card" role="main" aria-labelledby="reset-title">
      <h1 id="reset-title" class="title">Forget Password</h1>
      <p class="subtitle">Reset password link will be sent to your email.</p>

      <form id="resetForm" class="form" onsubmit="return false;">
        <label class="field-label" for="email">EMAIL</label>
        <input id="email" name="email" type="email" class="input" placeholder="hello@reallygreatsite.com" autocomplete="email" required />

        <button id="btnSend" class="btn btn-primary" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="../js/forget-password.js"></script>
  <script src="../js/layout.js"></script>
</body>
</html>
