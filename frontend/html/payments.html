<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMS - Payments</title>
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/payments.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebar-placeholder"></div>
        
        <main class="main-content">
            <div id="header-placeholder"></div>

            <div class="filter-section">
                <div class="filter-controls">
                    <div class="select-wrapper">
                        <select id="searchType">
                            <option value="name">Name</option>
                            <option value="id">ID</option>
                            <option value="phone">Phone No</option>
                        </select>
                        <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </div>
                    
                    <div class="search-wrapper">
                        <input type="text" id="searchInput" placeholder="Enter Name">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                </div>
            </div>

            <div style="display: flex; justify-content: center; gap: 80px; align-items: center; margin-bottom: 20px;">
                
                <div class="plan-tabs" style="margin: 0;">
                    <div class="plan-tab active" id="tabCable" onclick="setPlanType('cable')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>
                        Cable Plans
                        <input type="checkbox" checked style="display: none;"> 
                    </div>
                    <div class="plan-tab" id="tabInternet" onclick="setPlanType('internet')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        Internet Plans
                        <input type="checkbox" style="display: none;"> 
                    </div>
                </div>

                <div class="plan-tabs" style="width: 450px; display: flex; margin: 0;">
                    <div class="plan-tab active" id="tabPending" onclick="setStatus('pending')" style="flex: 1; justify-content: center;">
                        Pending
                        <input type="checkbox" checked style="display: none;">
                    </div>
                    <div class="plan-tab" id="tabCleared" onclick="setStatus('cleared')" style="flex: 1; justify-content: center;">
                        Cleared
                        <input type="checkbox" style="display: none;">
                    </div>
                    <div class="plan-tab" id="tabAdvance" onclick="setStatus('advance')" style="flex: 1; justify-content: center;">
                        Advance
                        <input type="checkbox" style="display: none;">
                    </div>
                    <div class="plan-tab" id="tabFree" onclick="setStatus('free')" style="flex: 1; justify-content: center;">
                        Free
                        <input type="checkbox" style="display: none;">
                    </div>
                </div>
                
            </div>

            <div class="card table-card">
                <div class="table-scroll-wrapper">
                    <table class="plan-table">
                        <thead>
                            <tr>
                                <th style="width: 20%;">Customer Name</th>
                                <th style="width: 15%; text-align: center;">Plan</th>
                                <th style="width: 25%; text-align: center;">Phone No</th>
                                <th style="width: 10%; text-align: center;">ID</th>
                                <th style="width: 15%; text-align: center;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="paymentsTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
            
        </main>
    </div>

    <script src="../js/layout.js"></script>
    <script src="../js/payments.js"></script>
</body>
</html>
