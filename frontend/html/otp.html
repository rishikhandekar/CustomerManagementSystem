<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cable Media Service — OTP Verification</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <span>Cable Media Service</span>
      <a href="#" id="btnBack" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Go Back
      </a>
    </div>
  </header>

  <main class="page">
    <section class="login-card">
      <h1 class="title">Enter Verification Code</h1>

      <form id="otpForm" class="form" onsubmit="return false;">
        <div style="display:flex; justify-content:center; gap:36px; margin:28px 0 18px;">
          <input class="otp" maxlength="1" />
          <input class="otp" maxlength="1" />
          <input class="otp" maxlength="1" />
          <input class="otp" maxlength="1" />
          <input class="otp" maxlength="1" />
          <input class="otp" maxlength="1" />
        </div>

        <button class="btn btn-primary" type="submit">Verify</button>
      </form>
    </section>
  </main>

  <script src="../js/otp.js"></script>
</body>
</html>
