<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cable Media Service — Login</title>

  <!-- external CSS -->
  <link rel="stylesheet" href="../css/style.css" />

  <!-- inline fallback style if external CSS doesn't load (optional) -->
  <style id="inline-fallback" media="none">
    /* This is a tiny fallback only; real style is in css/style.css */
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">Cable Media Service</div>
  </header>

  <main class="page">
    <section class="login-card" role="main" aria-labelledby="login-title">
      <h1 id="login-title" class="title">Login</h1>
      <p class="subtitle">Don't have account? <a href="register.html" class="link">Register</a></p>

      <form id="loginForm" class="form" onsubmit="return false;">
        <label class="field-label" for="email">Email</label>
        <input id="email" name="email" type="email" class="input" placeholder="hello@reallygreatsite.com" autocomplete="username" required />

        <label class="field-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="input" placeholder="******" autocomplete="current-password" required />

        <div class="forgot-row">
          <a href="forget-password.html" class="forgot-link">FORGET PASSWORD?</a>
        </div>

        <button id="btnLogin" class="btn btn-primary" type="submit">Login</button>

        <div class="divider">OR LOGIN WITH</div>

        <button id="btnGoogle" class="btn btn-ghost" type="button">
          <span class="google-btn-text">Google</span>
        </button>
      </form>
    </section>
  </main>

  <div id="updateOverlay" class="update-overlay" style="display: none;">
    <div class="update-box">
      <div class="update-header">
        <h2>🚀 Update Required</h2>
        <p>Version <span id="updateNewVersion" style="color: #2563eb; font-weight: 600;"></span> is available.</p>
      </div>
      
      <div class="update-notes-container">
        <h4 style="margin: 0 0 10px; color: #111;">What's New:</h4>
        <ul id="updateNotesList" class="update-notes-list">
          </ul>
      </div>

      <div class="update-footer">
        <p style="font-size: 12px; color: #64748b; margin-bottom: 12px;">You must update to continue using the system.</p>
        
        <div id="updateProgressContainer" style="display: none; width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 12px; overflow: hidden;">
          <div id="updateProgressBar" style="width: 0%; height: 100%; background: #2563eb; transition: width 0.3s ease;"></div>
        </div>
        <p id="updateProgressText" style="display: none; font-size: 12px; color: #111; margin-bottom: 12px; font-weight: 600;">Downloading: 0%</p>

        <button id="btnDownloadUpdate" class="btn btn-primary" style="width: 100%;">Download Update</button>
      </div>
    </div>
  </div>

  <script src="../js/login.js"></script>
  <script src="../js/layout.js"></script>
</body>
</html>
