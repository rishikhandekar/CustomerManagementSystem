<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cable Media Service — Reset Password</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <span>Cable Media Service</span>
      <a href="login.html" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Go Back
      </a>
    </div>
  </header>

  <main class="page">
    <section class="login-card" role="main" aria-labelledby="resetpw-title">
      <h1 id="resetpw-title" class="title">Reset Password</h1>
      <p class="subtitle">Enter your new password below.</p>

      <form id="resetPwForm" class="form" onsubmit="return false;">
        <label class="field-label" for="newPassword">NEW PASSWORD</label>
        <div class="password-wrapper">
          <input id="newPassword" name="newPassword" type="password" class="input" placeholder="******" required />
          
          <div id="passwordReqs" class="password-reqs">
            <ul class="req-list">
              <li id="reqLength" class="req-item">At least 8 characters</li>
              <li id="reqLower" class="req-item">At least 1 lowercase letter</li>
              <li id="reqUpper" class="req-item">At least 1 uppercase letter</li>
              <li id="reqNumber" class="req-item">At least 1 number</li>
              <li id="reqSpecial" class="req-item">At least 1 special character</li>
            </ul>
          </div>
        </div>

        <label class="field-label" for="confirmPassword">CONFIRM PASSWORD</label>
        <input id="confirmPassword" name="confirmPassword" type="password" class="input" placeholder="******" required />

        <button id="btnReset" class="btn btn-primary" type="submit">Reset</button>
      </form>
    </section>
  </main>

  <script src="../js/reset-password.js"></script>
</body>
</html>
